[aether]
; AetherAI Device Agent Configuration
; Edit these values then run AetherAI_Agent.exe (or python agent.py)

; The Railway URL of your AetherAI cloud brain
cloud_url = wss://aetherai.up.railway.app

; A unique name for this device (e.g. john-laptop, office-pc)
device_id = my-device

; API key — must match AETHER_API_KEY set in Railway.
; Leave blank if you have not set an API key on the server.
; NEVER commit a real key to git. Set the key here only on the local
; copy that runs on the device — do not push this file after filling it in.
api_key =
