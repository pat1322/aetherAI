<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherAI — Command Center</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --bg3:     #1c2330;
      --card:    #1e2736;
      --border:  #2a3444;
      --accent:  #00e5ff;
      --accent2: #a78bfa;
      --green:   #00ff9d;
      --warn:    #ff6b6b;
      --orange:  #ffaa40;
      --text:    #e2e8f0;
      --muted:   #5a7080;
    }

    body {
      font-family: 'Consolas', 'Monaco', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ─────────────────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 48px;
      background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #000;
    }
    .logo-text { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
    .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 11px; color: var(--muted); }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); display: inline-block; margin-right: 4px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-dot.offline { background: var(--warn); animation: none; }

    .busy-bar {
      height: 2px; background: var(--bg2); flex-shrink: 0; overflow: hidden;
    }
    .busy-bar-inner {
      height: 100%; width: 30%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      display: none;
      animation: sweep 1.4s linear infinite;
    }
    @keyframes sweep { from { transform: translateX(-200%) } to { transform: translateX(500%) } }
    .busy-bar-inner.active { display: block; }

    .gear-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 4px; border-radius: 4px; font-family: inherit;
      transition: color 0.15s;
    }
    .gear-btn:hover { color: var(--accent); }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .layout {
      display: grid; grid-template-columns: 220px 1fr 260px;
      flex: 1; overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    .sidebar {
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header {
      padding: 10px 12px; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--muted); border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .clear-btn {
      background: none; border: none; color: var(--warn); font-size: 9px;
      cursor: pointer; padding: 2px 5px; border-radius: 3px; font-family: inherit;
    }
    .clear-btn:hover { background: rgba(255,107,107,0.1); }
    .task-list { flex: 1; overflow-y: auto; padding: 6px; }
    .task-card {
      padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 4px;
      border: 1px solid transparent; transition: border-color 0.15s, background 0.15s;
      background: var(--card);
    }
    .task-card:hover { border-color: var(--border); }
    .task-card.active { border-color: var(--accent); background: rgba(0,229,255,0.06); }
    .task-title { font-size: 11px; color: var(--text); line-height: 1.4; word-break: break-word; }
    .task-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 5px; font-size: 9px; color: var(--muted);
    }
    .task-badge {
      padding: 1px 6px; border-radius: 10px;
      font-size: 8px; font-weight: 700; text-transform: uppercase;
    }
    .task-badge.completed { background: rgba(0,255,157,0.15);  color: var(--green); }
    .task-badge.running   { background: rgba(0,229,255,0.15);  color: var(--accent); }
    .task-badge.failed    { background: rgba(255,107,107,0.15); color: var(--warn); }
    .task-badge.planning  { background: rgba(167,139,250,0.15); color: var(--accent2); }
    .task-badge.cancelled { background: rgba(90,112,128,0.15); color: var(--muted); }
    .task-row { display: flex; align-items: flex-start; gap: 4px; }
    .task-del-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 12px; flex-shrink: 0; padding: 0 3px; line-height: 1;
      margin-top: 1px; font-family: inherit;
    }
    .task-del-btn:hover { color: var(--warn); }

    /* ── Main / Output ──────────────────────────────────────────────────── */
    main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .output-area {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      font-size: 12px; line-height: 1.7;
    }
    .log-entry {
      display: flex; gap: 12px; margin-bottom: 4px;
      opacity: 0; transform: translateY(4px);
      animation: fadeUp 0.2s ease forwards;
    }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    .log-time {
      color: var(--muted); white-space: nowrap; min-width: 68px;
      padding-top: 1px; font-size: 11px; flex-shrink: 0;
    }
    .log-msg  { flex: 1; white-space: pre-wrap; word-break: break-word; min-width: 0; }
    .log-msg.system  { color: var(--accent); }
    .log-msg.agent   { color: var(--accent2); }
    /* FIX 3: Changed result color from var(--green) to var(--text) for readability on long outputs */
    .log-msg.result  { color: var(--text); }
    .log-msg.error   { color: var(--warn); }
    .log-msg.info    { color: var(--text); }
    .log-msg.chat {
      color: var(--text);
      background: rgba(0,229,255,0.05);
      border-left: 2px solid var(--accent);
      padding: 8px 12px; border-radius: 0 6px 6px 0; white-space: normal;
    }
    .log-msg.chat strong { color: var(--accent); font-weight: 700; }
    .log-msg.chat em     { color: var(--accent2); font-style: italic; }
    .log-msg.chat a      { color: var(--accent); text-decoration: underline; }
    .log-msg.chat ul, .log-msg.chat ol { padding-left: 18px; margin: 4px 0; }
    .log-msg.chat li     { margin-bottom: 3px; }
    .log-msg.chat h1, .log-msg.chat h2, .log-msg.chat h3 { color: var(--accent); margin: 8px 0 4px; }
    .log-msg.chat hr { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
    .log-msg.chat p  { margin-bottom: 4px; }
    .log-msg.result strong { color: var(--green); font-weight: 700; }
    .log-msg.result a { color: var(--accent); text-decoration: underline; }
    .log-msg.result ul, .log-msg.result ol { padding-left: 18px; margin: 4px 0; }
    .log-msg.result li { margin-bottom: 3px; }

    .log-entry:hover .copy-result-btn { opacity: 1; }
    .copy-result-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 3px; padding: 1px 6px; font-size: 9px; cursor: pointer;
      font-family: inherit; opacity: 0; transition: opacity 0.15s, color 0.1s;
      flex-shrink: 0; align-self: flex-start; margin-top: 2px;
    }
    .copy-result-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Code blocks ────────────────────────────────────────────────────── */
    .code-block-wrapper { width: 100%; margin: 4px 0; }
    .code-block-header {
      display: flex; justify-content: space-between; align-items: center;
      background: #1a2233; border: 1px solid var(--border);
      border-bottom: none; border-radius: 6px 6px 0 0;
      padding: 5px 12px; font-size: 10px;
    }
    .code-lang { color: var(--accent2); font-weight: 700; text-transform: uppercase; }
    .code-copy-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 3px; padding: 2px 8px; font-size: 9px; cursor: pointer; font-family: inherit;
    }
    .code-copy-btn:hover { color: var(--accent); border-color: var(--accent); }
    .code-block-body {
      background: #0d1117; border: 1px solid var(--border);
      border-radius: 0 0 6px 6px; padding: 12px 14px; overflow-x: auto;
      font-size: 11.5px; line-height: 1.6; color: #c9d1d9; white-space: pre;
      max-height: 420px; overflow-y: auto;
    }

    /* ── Input row ──────────────────────────────────────────────────────── */
    .input-row {
      border-top: 1px solid var(--border); padding: 12px 16px;
      display: flex; gap: 8px; align-items: center;
      background: var(--bg2); flex-shrink: 0;
    }
    .prompt { color: var(--accent); font-size: 13px; white-space: nowrap; }
    .cmd-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 13px;
    }
    .cmd-input::placeholder { color: var(--muted); }
    .btn {
      padding: 6px 14px; border-radius: 5px; border: none; cursor: pointer;
      font-family: inherit; font-size: 11px; font-weight: 700; transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: var(--accent); color: #000; }
    .btn.primary:hover:not(:disabled) { opacity: 0.85; }
    .btn.danger  { background: var(--warn); color: #fff; }
    .btn.danger:hover:not(:disabled)  { opacity: 0.85; }

    /* ── Right panel ────────────────────────────────────────────────────── */
    .panel {
      background: var(--bg2); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-header {
      padding: 10px 12px; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--muted); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .devices-row {
      padding: 8px 12px; font-size: 10px; color: var(--muted);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .device-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(0,255,157,0.1); color: var(--green);
      border-radius: 10px; padding: 2px 8px; font-size: 9px; font-weight: 700;
    }
    .steps-list { flex: 1; overflow-y: auto; padding: 8px; }
    .step-item {
      padding: 8px 10px; border-radius: 5px; margin-bottom: 4px;
      background: var(--card); border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .step-item.is-running { border-color: var(--accent); }
    .step-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .step-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .step-dot.pending   { background: var(--muted); }
    .step-dot.running   { background: var(--accent); animation: pulse 1s infinite; }
    .step-dot.completed { background: var(--green); }
    .step-dot.failed    { background: var(--warn); }
    .step-agent { font-size: 10px; font-weight: 700; color: var(--accent2); }
    .step-desc  { font-size: 10px; color: var(--muted); line-height: 1.4; }
    .step-output {
      font-size: 10px; color: var(--text); margin-top: 4px;
      line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    }

    /* ── Files section ──────────────────────────────────────────────────── */
    .files-section {
      border-top: 1px solid var(--border); padding: 8px 10px;
      max-height: 220px; overflow-y: auto; flex-shrink: 0;
    }
    .files-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
      margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center;
    }
    .file-item {
      display: flex; align-items: center; gap: 5px; padding: 5px 7px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 5px; margin-bottom: 4px;
    }
    .file-ext {
      font-size: 8px; padding: 1px 4px; border-radius: 3px;
      font-weight: 700; text-transform: uppercase; flex-shrink: 0;
    }
    .ext-pptx { background: rgba(255,107,53,0.15);  color: #ff6b35; }
    .ext-docx { background: rgba(0,229,255,0.12);   color: var(--accent); }
    .ext-xlsx { background: rgba(0,255,157,0.12);   color: var(--green); }
    .ext-py   { background: rgba(167,139,250,0.15); color: var(--accent2); }
    .ext-js   { background: rgba(255,170,64,0.15);  color: var(--orange); }
    .ext-ts   { background: rgba(0,229,255,0.12);   color: var(--accent); }
    .ext-c    { background: rgba(0,229,255,0.12);   color: var(--accent); }
    .ext-cpp  { background: rgba(0,229,255,0.12);   color: var(--accent); }
    .ext-rs   { background: rgba(255,107,53,0.15);  color: #ff6b35; }
    .ext-go   { background: rgba(0,229,255,0.12);   color: var(--accent); }
    .ext-sh   { background: rgba(0,255,157,0.12);   color: var(--green); }
    .file-name {
      font-size: 10px; color: var(--text); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .file-size { font-size: 9px; color: var(--muted); flex-shrink: 0; }
    .file-dl   { font-size: 10px; color: var(--accent); text-decoration: none; flex-shrink: 0; }
    .file-dl:hover { text-decoration: underline; }
    .file-x {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 11px; flex-shrink: 0; font-family: inherit; padding: 0 2px;
    }
    .file-x:hover { color: var(--warn); }

    .panel-actions { padding: 8px; border-top: 1px solid var(--border); flex-shrink: 0; }

    /* ── Settings modal ─────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px; width: 340px; max-width: 90vw;
    }
    .modal-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;
    }
    .modal-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 16px; font-family: inherit; padding: 0 2px;
    }
    .modal-close:hover { color: var(--text); }
    .field-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 5px;
    }
    .field-input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 12px;
      padding: 6px 10px; border-radius: 5px; outline: none; margin-bottom: 14px;
    }
    .field-input:focus { border-color: var(--accent); }
    .modal-save {
      width: 100%; background: var(--accent); color: #000; border: none;
      border-radius: 5px; padding: 8px; font-family: inherit;
      font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .modal-save:hover { opacity: 0.85; }

    /* ── Confirm dialog ─────────────────────────────────────────────────── */
    .confirm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center; z-index: 110;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px; width: 280px; max-width: 90vw; text-align: center;
    }
    .confirm-msg { font-size: 12px; color: var(--text); margin-bottom: 16px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 8px; justify-content: center; }
    .confirm-btns button {
      padding: 6px 18px; border-radius: 5px; border: none;
      font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .confirm-yes { background: var(--warn); color: #fff; }
    .confirm-no  { background: var(--border); color: var(--text); }

    /* ── Scrollbar ──────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── Topbar ─────────────────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">A</div>
    <span class="logo-text">AetherAI</span>
  </div>
  <div class="topbar-right">
    <span id="statusIndicator"><span class="status-dot"></span>ONLINE</span>
    <span id="deviceCount">0 devices</span>
    <span id="clockDisplay"></span>
    <button class="gear-btn" onclick="openSettings()" title="Settings">&#9881;</button>
  </div>
</div>

<!-- Busy bar -->
<div class="busy-bar"><div class="busy-bar-inner" id="busyBar"></div></div>

<!-- ── Layout ─────────────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>Recent Tasks</span>
      <button class="clear-btn" onclick="confirmDeleteAllTasks()">✕ Clear all</button>
    </div>
    <div class="task-list" id="taskList">
      <div style="color:var(--muted);font-size:10px;padding:10px">No tasks yet</div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="output-area" id="outputArea">
      <div class="log-entry">
        <span class="log-time"></span>
        <span class="log-msg system">AetherAI Stage 5 ready. Built by Patrick Perez.</span>
      </div>
    </div>
    <div class="input-row">
      <span class="prompt">aether&gt;</span>
      <input class="cmd-input" id="cmdInput"
             placeholder="Create a presentation... / Research... / Open Chrome..."
             autocomplete="off" />
      <button class="btn primary" id="sendBtn" onclick="sendCommand()">Run</button>
      <button class="btn danger"  id="stopBtn" onclick="stopTask()" style="display:none">Stop</button>
    </div>
  </main>

  <!-- Right panel -->
  <aside class="panel">
    <div class="panel-header">Task Detail</div>
    <div class="devices-row" id="devicesRow">No devices connected</div>
    <div class="steps-list" id="stepsList">
      <div style="color:var(--muted);padding:10px;font-size:10px">Select a task to see steps</div>
    </div>
    <div class="files-section" id="filesSection">
      <div class="files-title">
        <span>Generated Files</span>
        <button class="clear-btn" onclick="confirmDeleteAllFiles()">✕ Clear</button>
      </div>
      <div id="filesList"><div style="color:var(--muted);font-size:10px">No files yet</div></div>
    </div>
    <div class="panel-actions" id="panelActions" style="display:none">
      <button class="btn danger" style="width:100%;font-size:11px" onclick="cancelActiveTask()">Cancel Task</button>
    </div>
  </aside>
</div>

<!-- ── Settings modal ───────────────────────────────────────────────────── -->
<div class="modal-overlay" id="settingsOverlay" onclick="closeSettingsOnBg(event)">
  <div class="modal">
    <div class="modal-title">
      <span>Settings</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="field-label">API Key</div>
    <input class="field-input" id="settingsApiKey" type="password"
           placeholder="Leave blank if no key is set" />
    <button class="modal-save" onclick="saveSettings()">Save</button>
  </div>
</div>

<!-- ── Confirm dialog ────────────────────────────────────────────────────── -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg">Are you sure?</div>
    <div class="confirm-btns">
      <button class="confirm-yes" id="confirmYes">Delete</button>
      <button class="confirm-no"  onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script>
/* ── Constants ──────────────────────────────────────────────────────────── */
const BASE_URL   = window.location.origin;
const WS_BASE    = BASE_URL.replace(/^http/, 'ws');
const SESSION_ID = crypto.randomUUID();

let API_KEY      = localStorage.getItem('aether_api_key') || '';
let activeTaskId = null;
let ws           = null;
let taskRunning  = false;

let cmdHistory   = JSON.parse(localStorage.getItem('aether_cmd_history') || '[]');
let historyIdx   = -1;
let historyDraft = '';

let lastShownOutput = null;

let tasksInterval, filesInterval, devicesInterval;

/* ── Clock ──────────────────────────────────────────────────────────────── */
function updateClock() {
  document.getElementById('clockDisplay').textContent =
    new Date().toLocaleTimeString('en-GB', { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

/* ── Utilities ──────────────────────────────────────────────────────────── */
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function now() {
  return new Date().toLocaleTimeString('en-GB', { hour12: false });
}

/* FIX 1: Append 'Z' to UTC timestamps stored by SQLite (no timezone suffix)
   so the browser interprets them as UTC, not local time. Without this fix
   the displayed age is offset by the local UTC offset (e.g. +8 h in Manila). */
function timeAgo(iso) {
  if (!iso) return '';
  const dateStr = iso.endsWith('Z') ? iso : iso + 'Z';
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return `${Math.floor(diff/3600)}h ago`;
}

function fmtSize(kb) {
  if (kb < 1024) return `${kb} KB`;
  return `${(kb / 1024).toFixed(1)} MB`;
}

/* ── Markdown renderer ───────────────────────────────────────────────────── */
function renderMarkdown(text) {
  let s = escHtml(text);

  s = s.replace(/```[\w]*\n?([\s\S]*?)```/g,
    '<code style="background:#1a2233;padding:2px 5px;border-radius:3px;font-family:inherit;display:inline-block">$1</code>');

  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,         '<em>$1</em>');

  s = s.replace(/`([^`]+)`/g,
    '<code style="background:#1a2233;padding:1px 5px;border-radius:3px;font-family:inherit">$1</code>');

  s = s.replace(/^[-*]{3,}$/gm, '<hr>');

  s = s.replace(/((?:^[•\-] .+$\n?)+)/gm, match => {
    const items = match.trim().split('\n')
      .map(l => `<li>${l.replace(/^[•\-] /, '')}</li>`)
      .join('');
    return `<ul>${items}</ul>\n`;
  });

  s = s.replace(/((?:^\d+\. .+$\n?)+)/gm, match => {
    const items = match.trim().split('\n')
      .map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`)
      .join('');
    return `<ol>${items}</ol>\n`;
  });

  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');

  s = s.replace(/(https?:\/\/[^\s<"]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');

  s = s.replace(/\n\n+/g, '</p><p>');
  s = '<p>' + s + '</p>';
  s = s.replace(/\n/g, '<br>');

  s = s.replace(/<p>\s*<\/p>/g, '');
  s = s.replace(/<p>(<(?:h[1-3]|ul|ol|hr)[^>]*)>/g, '$1>');
  s = s.replace(/<\/(h[1-3]|ul|ol)><\/p>/g, '</$1>');
  s = s.replace(/<p>(<hr>)<\/p>/g, '$1');

  return s;
}

/* ── Busy bar ────────────────────────────────────────────────────────────── */
function setBusy(on) {
  taskRunning = on;
  document.getElementById('busyBar').classList.toggle('active', on);
}

/* ── Log helpers ─────────────────────────────────────────────────────────── */
function log(msg, cls = 'info') {
  appendLog(`<span class="log-msg ${cls}">${escHtml(msg)}</span>`);
}

function logMarkdown(msg, cls = 'result') {
  const copyId = 'cr_' + Math.random().toString(36).slice(2);
  const rawText = msg;
  appendLog(`
    <span class="log-msg ${cls}">${renderMarkdown(msg)}</span>
    <button class="copy-result-btn" id="${copyId}" onclick="copyResult('${copyId}','${escHtml(rawText).replace(/'/g,"\\'")}')" title="Copy">⎘</button>
  `);
}

function logCodeBlock(summary, language, code) {
  if (summary) {
    appendLog(`<span class="log-msg result">${escHtml(summary)}</span>`);
  }
  const blockId = 'cb_' + Math.random().toString(36).slice(2);
  const area = document.getElementById('outputArea');
  const el   = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `
    <span class="log-time"></span>
    <div class="code-block-wrapper">
      <div class="code-block-header">
        <span class="code-lang">${escHtml(language)}</span>
        <button class="code-copy-btn" onclick="copyCode('${blockId}')">Copy</button>
      </div>
      <pre class="code-block-body" id="${blockId}">${escHtml(code)}</pre>
    </div>`;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function appendLog(innerHtml) {
  const area = document.getElementById('outputArea');
  const el   = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-time">[${now()}]</span>${innerHtml}`;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function clearOutput() {
  document.getElementById('outputArea').innerHTML = '';
  lastShownOutput = null;
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.closest('.code-block-wrapper')?.querySelector('.code-copy-btn');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); }
  });
}

function copyResult(btnId, rawText) {
  const txt = rawText.replace(/&amp;/g,'&').replace(/&lt;/g,'<')
                     .replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById(btnId);
    if (btn) { btn.textContent = '✓'; setTimeout(() => btn.textContent = '⎘', 1500); }
  });
}

/* ── WebSocket ───────────────────────────────────────────────────────────── */
let wsReconnectDelay = 3000;

function connectWS() {
  ws = new WebSocket(`${WS_BASE}/ws/ui/${SESSION_ID}`);
  ws.onopen = () => {
    wsReconnectDelay = 3000;
    document.getElementById('statusIndicator').innerHTML =
      '<span class="status-dot"></span>ONLINE';
  };
  ws.onclose = () => {
    document.getElementById('statusIndicator').innerHTML =
      '<span class="status-dot offline"></span>OFFLINE';
    setTimeout(connectWS, wsReconnectDelay);
    wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, 30000);
  };
  ws.onerror = () => {
    document.getElementById('statusIndicator').innerHTML =
      '<span class="status-dot offline"></span>ERROR';
  };
  ws.onmessage = e => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }
    if (data.type === 'task_update')         handleTaskUpdate(data);
    if (data.type === 'device_connected')    refreshDevices();
    if (data.type === 'device_disconnected') refreshDevices();
    if (data.type === 'ping')                ws.send(JSON.stringify({ type: 'pong' }));
  };
}
connectWS();

/* ── Task updates ────────────────────────────────────────────────────────── */
function handleTaskUpdate(data) {
  const { task_id, status, message, agent, result, plan, code_block } = data;

  if (plan)    renderPlan(plan);
  if (message) log(message, agentClass(agent || status));

  if (code_block && code_block.code) {
    logCodeBlock(data.output || '', code_block.language, code_block.code);
    lastShownOutput = data.output || '';
    refreshFiles();
  }

  if (data.is_chat && result) {
    const area = document.getElementById('outputArea');
    const copyId = 'cr_' + Math.random().toString(36).slice(2);
    const el   = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `
      <span class="log-time">[${now()}]</span>
      <span class="log-msg chat">&#x1F4AC; ${renderMarkdown(result)}</span>
      <button class="copy-result-btn" id="${copyId}"
              onclick="copyResult('${copyId}','${escHtml(result).replace(/'/g,"\\'")}')">⎘</button>`;
    area.appendChild(el);
    area.scrollTop = area.scrollHeight;
    lastShownOutput = result;
    unlockInput();
    loadTasks();
    return;
  }

  if (data.output && !code_block && data.step_status === 'completed') {
    logMarkdown('✓ ' + data.output, 'result');
    lastShownOutput = data.output;
  }

  if (status === 'completed' || status === 'failed' || status === 'cancelled') {
    if (result && !code_block) {
      const rt = result.trim();
      const lt = (lastShownOutput || '').trim();
      const isDup = lt && (rt === lt || (lt.length > 40 && rt.startsWith(lt.slice(0, 40))));
      if (!isDup) logMarkdown('✓ ' + result, 'result');
    }
    setBusy(false);
    unlockInput();
    refreshFiles();
    if (activeTaskId === task_id) {
      document.getElementById('panelActions').style.display = 'none';
    }
  }

  loadTasks();
  if (activeTaskId === task_id) loadSteps(task_id);
}

function agentClass(hint) {
  if (!hint) return 'info';
  if (hint.includes('agent')) return 'agent';
  if (hint === 'planning')    return 'system';
  if (hint === 'completed')   return 'result';
  if (hint === 'failed')      return 'error';
  return 'info';
}

function unlockInput() {
  setBusy(false);
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').style.display = '';
  document.getElementById('stopBtn').style.display  = 'none';
  document.getElementById('cmdInput').disabled = false;
  document.getElementById('cmdInput').focus();
}

/* ── Send command ────────────────────────────────────────────────────────── */
async function sendCommand() {
  const input = document.getElementById('cmdInput');
  const cmd   = input.value.trim();
  if (!cmd) return;

  if (cmdHistory[0] !== cmd) {
    cmdHistory.unshift(cmd);
    if (cmdHistory.length > 50) cmdHistory.pop();
    localStorage.setItem('aether_cmd_history', JSON.stringify(cmdHistory));
  }
  historyIdx   = -1;
  historyDraft = '';

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'inline-block';
  input.disabled = false;
  setBusy(true);

  clearOutput();
  log(`> ${cmd}`, 'system');

  try {
    const res  = await fetch(`${BASE_URL}/command`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': API_KEY },
      body: JSON.stringify({ command: cmd, source: 'web' }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    activeTaskId = data.task_id;
    log(`Task ${data.task_id.slice(0,8)}…`, 'info');
    document.getElementById('panelActions').style.display = 'flex';
    loadTasks();
  } catch (err) {
    log(`Connection error: ${err}`, 'error');
    unlockInput();
  }
}

async function stopTask() {
  if (!activeTaskId) return;
  try {
    await fetch(`${BASE_URL}/task/${activeTaskId}/cancel`, { method: 'POST' });
    log('Task cancellation requested.', 'system');
  } catch (e) {
    log(`Cancel failed: ${e}`, 'error');
  }
}
async function cancelActiveTask() { await stopTask(); }

/* ── Plan visualization ──────────────────────────────────────────────────── */
function renderPlan(plan) {
  const list = document.getElementById('stepsList');
  list.innerHTML = plan.map(s => `
    <div class="step-item" id="step-${s.step}">
      <div class="step-header">
        <div class="step-dot pending" id="dot-${s.step}"></div>
        <span class="step-agent">${escHtml(s.agent)}</span>
      </div>
      <div class="step-desc">${escHtml(s.description)}</div>
    </div>`).join('');
}

async function loadSteps(taskId) {
  try {
    const res  = await fetch(`${BASE_URL}/task/${taskId}`);
    if (!res.ok) return;
    const data = await res.json();
    if (!data.steps || !data.steps.length) return;

    const list = document.getElementById('stepsList');
    list.innerHTML = data.steps.map(s => {
      const isRunning = s.status === 'running';
      const outputHtml = s.output
        ? `<div class="step-output">${escHtml(s.output.split('\n')[0])}</div>`
        : '';
      return `
        <div class="step-item${isRunning ? ' is-running' : ''}">
          <div class="step-header">
            <div class="step-dot ${s.status || 'pending'}"></div>
            <span class="step-agent">${escHtml(s.agent)}</span>
          </div>
          <div class="step-desc">${escHtml(s.description)}</div>
          ${outputHtml}
        </div>`;
    }).join('');

    const running = list.querySelector('.is-running');
    if (running) running.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  } catch {}
}

/* ── Task list ───────────────────────────────────────────────────────────── */
async function loadTasks() {
  if (document.hidden) return;
  try {
    const res   = await fetch(`${BASE_URL}/tasks?limit=30`);
    if (!res.ok) return;
    const data  = await res.json();
    const tasks = data.tasks || data || [];
    const list  = document.getElementById('taskList');

    if (!tasks.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:10px;padding:10px">No tasks yet</div>';
      return;
    }

    list.innerHTML = tasks.map(t => `
      <div class="task-card ${t.task_id === activeTaskId ? 'active' : ''}"
           onclick="selectTask('${t.task_id}')">
        <div class="task-row">
          <div class="task-title" style="flex:1">${escHtml(t.command)}</div>
          <button class="task-del-btn" onclick="deleteTask('${t.task_id}',event)">✕</button>
        </div>
        <div class="task-meta">
          <span>${timeAgo(t.created_at)}</span>
          <span class="task-badge ${t.status}">${t.status}</span>
        </div>
      </div>`).join('');
  } catch {}
}
loadTasks();
tasksInterval = setInterval(loadTasks, 10000);

/* FIX 10: Reconstruct output area from stored step data when clicking an old task.
   Previously selectTask only updated the right-panel steps list; the main output
   area stayed blank for historical tasks. Now we fetch the full task + steps and
   replay each completed step's output into the output area. */
async function selectTask(taskId) {
  activeTaskId = taskId;
  loadTasks();  // refresh sidebar highlight

  try {
    const res = await fetch(`${BASE_URL}/task/${taskId}`);
    if (!res.ok) return;
    const task = await res.json();

    // ── Render steps in right panel ──────────────────────────────────────
    if (task.steps?.length) {
      const list = document.getElementById('stepsList');
      list.innerHTML = task.steps.map(s => {
        const outputHtml = s.output
          ? `<div class="step-output">${escHtml(s.output.slice(0, 120))}</div>`
          : '';
        return `
          <div class="step-item">
            <div class="step-header">
              <div class="step-dot ${s.status || 'pending'}"></div>
              <span class="step-agent">${escHtml(s.agent)}</span>
            </div>
            <div class="step-desc">${escHtml(s.description)}</div>
            ${outputHtml}
          </div>`;
      }).join('');
    }

    // Only reconstruct output for finished tasks (running tasks use live WS)
    if (task.status === 'running' || task.status === 'planning') return;

    // ── Reconstruct output area ──────────────────────────────────────────
    clearOutput();
    log(`> ${task.command}`, 'system');
    log(`Task ${taskId.slice(0,8)}… — ${task.status}`, 'info');

    if (task.steps) {
      for (const step of task.steps) {
        if (step.output && step.status === 'completed') {
          log(`${step.agent}: ${step.description}`, 'agent');
          logMarkdown('✓ ' + step.output, 'result');
          lastShownOutput = step.output;
        }
      }
    }

    // Show final result if it wasn't already shown via a step
    if (task.result && task.status === 'completed') {
      const rt = task.result.trim();
      const lt = (lastShownOutput || '').trim();
      const isDup = lt && (rt === lt || (lt.length > 40 && rt.startsWith(lt.slice(0, 40))));
      if (!isDup) logMarkdown('✓ ' + task.result, 'result');
    } else if (task.result && task.status === 'failed') {
      log(`Failed: ${task.result}`, 'error');
    }

  } catch (e) {
    console.error('selectTask error:', e);
  }
}

async function deleteTask(taskId, e) {
  e.stopPropagation();
  await fetch(`${BASE_URL}/task/${taskId}`, { method: 'DELETE' });
  if (activeTaskId === taskId) {
    activeTaskId = null;
    document.getElementById('stepsList').innerHTML =
      '<div style="color:var(--muted);padding:10px;font-size:10px">Select a task to see steps</div>';
    document.getElementById('panelActions').style.display = 'none';
    clearOutput();
  }
  loadTasks();
}

function confirmDeleteAllTasks() {
  showConfirm('Delete ALL tasks? This cannot be undone.', async () => {
    await fetch(`${BASE_URL}/tasks/all`, { method: 'DELETE' });
    activeTaskId = null;
    document.getElementById('stepsList').innerHTML =
      '<div style="color:var(--muted);padding:10px;font-size:10px">Select a task to see steps</div>';
    document.getElementById('panelActions').style.display = 'none';
    clearOutput();
    loadTasks();
  });
}

/* ── Files ───────────────────────────────────────────────────────────────── */
async function deleteFile(filename, e) {
  e.stopPropagation();
  await fetch(`${BASE_URL}/files/${encodeURIComponent(filename)}`, { method: 'DELETE' });
  refreshFiles();
}

function confirmDeleteAllFiles() {
  showConfirm('Delete ALL generated files?', async () => {
    await fetch(`${BASE_URL}/files/all/clear`, { method: 'DELETE' });
    refreshFiles();
  });
}

async function refreshFiles() {
  if (document.hidden) return;
  try {
    const res   = await fetch(`${BASE_URL}/files`);
    if (!res.ok) return;
    const data  = await res.json();
    const files = data.files || [];
    const el    = document.getElementById('filesList');

    if (!files.length) {
      el.innerHTML = '<div style="color:var(--muted);font-size:10px">No files yet</div>';
      return;
    }

    el.innerHTML = files.map(f => {
      const ext = f.name.split('.').pop().toLowerCase();
      const sz  = f.size_kb != null ? fmtSize(f.size_kb) : '';
      return `<div class="file-item">
        <span class="file-ext ext-${ext}">${ext}</span>
        <span class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
        ${sz ? `<span class="file-size">${sz}</span>` : ''}
        <a class="file-dl" href="${BASE_URL}${f.url}" download="${escHtml(f.name)}">↓</a>
        <button class="file-x" onclick="deleteFile('${escHtml(f.name)}',event)">✕</button>
      </div>`;
    }).join('');
  } catch {}
}
refreshFiles();
filesInterval = setInterval(refreshFiles, 8000);

/* ── Devices ─────────────────────────────────────────────────────────────── */
async function refreshDevices() {
  if (document.hidden) return;
  try {
    const res  = await fetch(`${BASE_URL}/devices`);
    if (!res.ok) return;
    const data = await res.json();
    const devs = data.devices || [];
    const row  = document.getElementById('devicesRow');
    const cnt  = document.getElementById('deviceCount');

    if (!devs.length) {
      row.textContent = 'No devices connected';
      cnt.textContent = '0 devices';
    } else {
      row.innerHTML = devs.map(d => `<span class="device-chip">&#x2B21; ${escHtml(d)}</span>`).join(' ');
      cnt.textContent = `${devs.length} device${devs.length > 1 ? 's' : ''}`;
    }
  } catch {}
}
refreshDevices();
devicesInterval = setInterval(refreshDevices, 15000);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { loadTasks(); refreshFiles(); refreshDevices(); }
});

/* ── Settings modal ──────────────────────────────────────────────────────── */
function openSettings() {
  document.getElementById('settingsApiKey').value = API_KEY;
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}
function closeSettingsOnBg(e) {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
}
function saveSettings() {
  API_KEY = document.getElementById('settingsApiKey').value.trim();
  localStorage.setItem('aether_api_key', API_KEY);
  closeSettings();
  log('Settings saved.', 'system');
}

/* ── Confirm dialog ──────────────────────────────────────────────────────── */
let _confirmCallback = null;
function showConfirm(msg, cb) {
  document.getElementById('confirmMsg').textContent = msg;
  _confirmCallback = cb;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  _confirmCallback = null;
  document.getElementById('confirmOverlay').classList.remove('open');
}
document.getElementById('confirmYes').addEventListener('click', () => {
  if (_confirmCallback) _confirmCallback();
  closeConfirm();
});

/* ── Keyboard shortcuts ──────────────────────────────────────────────────── */
document.getElementById('cmdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    sendCommand();
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx === -1) historyDraft = e.target.value;
    if (historyIdx < cmdHistory.length - 1) {
      historyIdx++;
      e.target.value = cmdHistory[historyIdx];
    }
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) {
      historyIdx--;
      e.target.value = cmdHistory[historyIdx];
    } else if (historyIdx === 0) {
      historyIdx = -1;
      e.target.value = historyDraft;
    }
    return;
  }

  if (e.key === 'Escape') {
    e.target.value = '';
    historyIdx = -1;
    return;
  }
});

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
    e.preventDefault();
    clearOutput();
  }
});
