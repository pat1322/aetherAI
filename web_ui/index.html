<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherAI — Command Center</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --bg3:     #1c2330;
      --card:    #1e2736;
      --border:  #2a3444;
      --accent:  #00e5ff;
      --accent2: #a78bfa;
      --green:   #00ff9d;
      --warn:    #ff6b6b;
      --orange:  #ffaa40;
      --text:    #e2e8f0;
      --muted:   #5a7080;
    }

    body {
      font-family: 'Consolas', 'Monaco', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #000;
    }
    .logo-text { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
    .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 11px; color: var(--muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-dot.offline { background: var(--warn); animation: none; }

    /* ── Main layout ── */
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 10px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .clear-btn {
      background: none; border: none;
      color: var(--warn); font-size: 9px;
      cursor: pointer; padding: 2px 5px;
      border-radius: 3px; font-family: inherit;
    }
    .clear-btn:hover { background: rgba(255,107,107,0.1); }
    .task-list { flex: 1; overflow-y: auto; padding: 6px; }
    .task-card {
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      border: 1px solid transparent;
      transition: all 0.15s;
      background: var(--card);
    }
    .task-card:hover { border-color: var(--border); }
    .task-card.active { border-color: var(--accent); background: rgba(0,229,255,0.06); }
    .task-title { font-size: 11px; color: var(--text); line-height: 1.4; word-break: break-word; }
    .task-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; font-size: 9px; color: var(--muted); }
    .task-badge { padding: 1px 6px; border-radius: 10px; font-size: 8px; font-weight: 700; text-transform: uppercase; }
    .task-badge.completed { background: rgba(0,255,157,0.15); color: var(--green); }
    .task-badge.running   { background: rgba(0,229,255,0.15); color: var(--accent); }
    .task-badge.failed    { background: rgba(255,107,107,0.15); color: var(--warn); }
    .task-badge.planning  { background: rgba(167,139,250,0.15); color: var(--accent2); }
    .task-badge.cancelled { background: rgba(90,112,128,0.15); color: var(--muted); }
    .task-row { display: flex; align-items: flex-start; gap: 4px; }
    .task-del-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 12px; flex-shrink: 0;
      padding: 0 3px; line-height: 1; margin-top: 1px;
      font-family: inherit;
    }
    .task-del-btn:hover { color: var(--warn); }

    /* ── Main panel ── */
    main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      font-size: 12px;
      line-height: 1.7;
    }
    .log-entry {
      display: flex;
      gap: 12px;
      margin-bottom: 4px;
      opacity: 0;
      transform: translateY(4px);
      animation: fadeUp 0.2s ease forwards;
    }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    .log-time { color: var(--muted); white-space: nowrap; min-width: 68px; padding-top: 1px; font-size: 11px; }
    .log-msg  { flex: 1; white-space: pre-wrap; word-break: break-word; }
    .log-msg.system  { color: var(--accent); }
    .log-msg.agent   { color: var(--accent2); }
    .log-msg.result  { color: var(--green); }
    .log-msg.error   { color: var(--warn); }
    .log-msg.chat    { color: var(--text); background: rgba(0,229,255,0.05); border-left: 2px solid var(--accent); padding: 6px 10px; border-radius: 0 6px 6px 0; }
    .log-msg.info    { color: var(--text); }

    /* ── Input row ── */
    .input-row {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--bg2);
      flex-shrink: 0;
    }
    .prompt { color: var(--accent); font-size: 13px; white-space: nowrap; }
    .cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
    }
    .cmd-input::placeholder { color: var(--muted); }
    .btn {
      padding: 6px 14px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: var(--accent); color: #000; }
    .btn.primary:hover:not(:disabled) { opacity: 0.85; }
    .btn.danger  { background: var(--warn);  color: #fff; }
    .btn.danger:hover:not(:disabled)  { opacity: 0.85; }

    /* ── Right panel ── */
    .panel {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 10px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .devices-row {
      padding: 8px 12px;
      font-size: 10px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .device-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(0,255,157,0.1); color: var(--green);
      border-radius: 10px; padding: 2px 8px; font-size: 9px; font-weight: 700;
    }
    .steps-list { flex: 1; overflow-y: auto; padding: 8px; }
    .step-item {
      padding: 8px 10px;
      border-radius: 5px;
      margin-bottom: 4px;
      background: var(--card);
      border: 1px solid var(--border);
    }
    .step-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .step-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .step-dot.pending   { background: var(--muted); }
    .step-dot.running   { background: var(--accent); animation: pulse 1s infinite; }
    .step-dot.completed { background: var(--green); }
    .step-dot.failed    { background: var(--warn); }
    .step-agent { font-size: 10px; font-weight: 700; color: var(--accent2); }
    .step-desc  { font-size: 10px; color: var(--muted); line-height: 1.4; }
    .step-output { font-size: 10px; color: var(--text); margin-top: 4px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

    /* ── Files section ── */
    .files-section {
      border-top: 1px solid var(--border);
      padding: 8px 10px;
      max-height: 220px;
      overflow-y: auto;
    }
    .files-title {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted);
      margin-bottom: 7px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .file-item {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 7px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 5px;
      margin-bottom: 4px;
    }
    .file-ext {
      font-size: 8px; padding: 1px 4px;
      border-radius: 3px; font-weight: 700;
      text-transform: uppercase; flex-shrink: 0;
    }
    .ext-pptx { background: rgba(255,107,53,0.15); color: #ff6b35; }
    .ext-docx { background: rgba(0,229,255,0.12);  color: var(--accent); }
    .ext-xlsx { background: rgba(0,255,157,0.12);  color: var(--green); }
    .file-name {
      font-size: 10px; color: var(--text);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; flex: 1;
    }
    .file-dl  { font-size: 10px; color: var(--accent); text-decoration: none; flex-shrink: 0; }
    .file-dl:hover { text-decoration: underline; }
    .file-x   { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; flex-shrink: 0; font-family: inherit; padding: 0 2px; }
    .file-x:hover { color: var(--warn); }

    .panel-actions {
      padding: 8px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">A</div>
    <span class="logo-text">AetherAI</span>
  </div>
  <div class="topbar-right">
    <span id="statusIndicator"><span class="status-dot"></span>ONLINE</span>
    <span id="deviceCount">0 devices</span>
    <span id="clockDisplay"></span>
  </div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar: recent tasks -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>Recent Tasks</span>
      <button class="clear-btn" onclick="deleteAllTasks()" title="Clear all tasks">✕ Clear all</button>
    </div>
    <div class="task-list" id="taskList">
      <div style="color:var(--muted);font-size:10px;padding:10px">No tasks yet</div>
    </div>
  </aside>

  <!-- Main: log output + input -->
  <main>
    <div class="output-area" id="outputArea">
      <div class="log-entry">
        <span class="log-time"></span>
        <span class="log-msg system">AetherAI Stage 3 ready. Built by Patrick Perez.</span>
      </div>
    </div>
    <div class="input-row">
      <span class="prompt">aether&gt;</span>
      <input class="cmd-input" id="cmdInput"
             placeholder="Create a presentation about... / Research... / Open Chrome..."
             autocomplete="off" />
      <button class="btn primary" id="sendBtn" onclick="sendCommand()">Run</button>
      <button class="btn danger"  id="stopBtn" onclick="stopTask()" style="display:none">Stop</button>
    </div>
  </main>

  <!-- Right panel: task detail + files -->
  <aside class="panel">
    <div class="panel-header">Task Detail</div>
    <div class="devices-row" id="devicesRow">No devices connected</div>
    <div class="steps-list" id="stepsList">
      <div style="color:var(--muted);padding:10px;font-size:10px">Select a task to see steps</div>
    </div>
    <div class="files-section" id="filesSection">
      <div class="files-title">
        <span>Generated Files</span>
        <button class="clear-btn" onclick="deleteAllFiles()">✕ Clear</button>
      </div>
      <div id="filesList"><div style="color:var(--muted);font-size:10px">No files yet</div></div>
    </div>
    <div class="panel-actions" id="panelActions" style="display:none">
      <button class="btn danger" style="width:100%;font-size:11px" onclick="cancelActiveTask()">Cancel Task</button>
    </div>
  </aside>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const BASE_URL   = window.location.origin;
const WS_BASE    = BASE_URL.replace(/^http/, 'ws');
const API_KEY    = localStorage.getItem('aether_api_key') || '';
const SESSION_ID = crypto.randomUUID();

// ─── State ───────────────────────────────────────────────────────────────────
let activeTaskId = null;
let ws           = null;

// ─── Clock ───────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clockDisplay').textContent =
    new Date().toLocaleTimeString('en-GB', { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

// ─── Helpers ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function now() {
  return new Date().toLocaleTimeString('en-GB', { hour12: false });
}
function timeAgo(iso) {
  if (!iso) return '';
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return `${Math.floor(diff/3600)}h ago`;
}

// ─── Log output ──────────────────────────────────────────────────────────────
function log(msg, cls = 'info') {
  const area = document.getElementById('outputArea');
  const el   = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-time">[${now()}]</span><span class="log-msg ${cls}">${escHtml(msg)}</span>`;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}
function clearOutput() {
  document.getElementById('outputArea').innerHTML = '';
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(`${WS_BASE}/ws/ui/${SESSION_ID}`);
  ws.onopen  = () => { document.getElementById('statusIndicator').innerHTML = '<span class="status-dot"></span>ONLINE'; };
  ws.onclose = () => {
    document.getElementById('statusIndicator').innerHTML = '<span class="status-dot offline"></span>OFFLINE';
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'task_update')        handleTaskUpdate(data);
    if (data.type === 'device_connected')   refreshDevices();
    if (data.type === 'device_disconnected') refreshDevices();
    if (data.type === 'ping') ws.send(JSON.stringify({ type: 'pong' }));
  };
}
connectWS();

// ─── Task updates ─────────────────────────────────────────────────────────────
function handleTaskUpdate(data) {
  const { task_id, status, message, agent, current_step, result, plan } = data;

  if (plan)    renderPlan(plan);
  if (message) log(message, agentClass(agent || status));

  // Chat response — show nicely inline
  if (data.is_chat && result) {
    const area = document.getElementById('outputArea');
    const el   = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `<span class="log-time">[${now()}]</span><span class="log-msg chat">💬 ${escHtml(result)}</span>`;
    area.appendChild(el);
    area.scrollTop = area.scrollHeight;
    unlockInput();
    loadTasks();
    return;
  }

  if (result && status === 'completed') log('✓ ' + result, 'result');

  if (status === 'completed' || status === 'failed' || status === 'cancelled') {
    unlockInput();
    refreshFiles();
    if (activeTaskId === task_id) {
      document.getElementById('panelActions').style.display = 'none';
    }
  }
  loadTasks();
  if (activeTaskId === task_id) loadSteps(task_id);
}

function agentClass(hint) {
  if (!hint) return 'info';
  if (hint.includes('agent')) return 'agent';
  if (hint === 'planning')    return 'system';
  if (hint === 'completed')   return 'result';
  if (hint === 'failed')      return 'error';
  return 'info';
}

function unlockInput() {
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').style.display = '';
  document.getElementById('stopBtn').style.display  = 'none';
  document.getElementById('cmdInput').disabled = false;
}

// ─── Send command ─────────────────────────────────────────────────────────────
async function sendCommand() {
  const input = document.getElementById('cmdInput');
  const cmd   = input.value.trim();
  if (!cmd) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'inline-block';
  document.getElementById('cmdInput').disabled = false; // keep input usable for chat

  clearOutput();
  log(`> ${cmd}`, 'system');

  try {
    const res  = await fetch(`${BASE_URL}/command`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': API_KEY },
      body: JSON.stringify({ command: cmd, source: 'web' }),
    });
    const data = await res.json();
    activeTaskId = data.task_id;
    log(`Task ID: ${data.task_id}`, 'info');
    document.getElementById('panelActions').style.display = 'flex';
    loadTasks();
  } catch (err) {
    log(`Connection error: ${err}`, 'error');
    unlockInput();
  }
}

// ─── Stop task ────────────────────────────────────────────────────────────────
async function stopTask() {
  if (!activeTaskId) return;
  await fetch(`${BASE_URL}/task/${activeTaskId}/cancel`, { method: 'POST' });
  log('Task cancellation requested.', 'system');
}
async function cancelActiveTask() { await stopTask(); }

// ─── Plan visualization ───────────────────────────────────────────────────────
function renderPlan(plan) {
  const list = document.getElementById('stepsList');
  list.innerHTML = plan.map(s => `
    <div class="step-item" id="step-${s.step}">
      <div class="step-header">
        <div class="step-dot pending" id="dot-${s.step}"></div>
        <span class="step-agent">${escHtml(s.agent)}</span>
      </div>
      <div class="step-desc">${escHtml(s.description)}</div>
    </div>`).join('');
}

async function loadSteps(taskId) {
  try {
    const res  = await fetch(`${BASE_URL}/task/${taskId}`);
    const data = await res.json();
    if (!data.steps || !data.steps.length) return;

    const list = document.getElementById('stepsList');
    list.innerHTML = data.steps.map(s => `
      <div class="step-item">
        <div class="step-header">
          <div class="step-dot ${s.status || 'pending'}"></div>
          <span class="step-agent">${escHtml(s.agent)}</span>
        </div>
        <div class="step-desc">${escHtml(s.description)}</div>
        ${s.output ? `<div class="step-output">${escHtml(s.output)}</div>` : ''}
      </div>`).join('');
  } catch {}
}

// ─── Task list ────────────────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const res   = await fetch(`${BASE_URL}/tasks?limit=30`);
    const data  = await res.json();
    const tasks = data.tasks || data || [];
    const list  = document.getElementById('taskList');

    if (!tasks.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:10px;padding:10px">No tasks yet</div>';
      return;
    }

    list.innerHTML = tasks.map(t => `
      <div class="task-card ${t.task_id === activeTaskId ? 'active' : ''}"
           onclick="selectTask('${t.task_id}')">
        <div class="task-row">
          <div class="task-title" style="flex:1">${escHtml(t.command)}</div>
          <button class="task-del-btn" onclick="deleteTask('${t.task_id}',event)" title="Delete">✕</button>
        </div>
        <div class="task-meta">
          <span>${timeAgo(t.created_at)}</span>
          <span class="task-badge ${t.status}">${t.status}</span>
        </div>
      </div>`).join('');
  } catch {}
}
loadTasks();
setInterval(loadTasks, 10000);

function selectTask(taskId) {
  activeTaskId = taskId;
  loadSteps(taskId);
  loadTasks();
}

// ─── Delete functions ─────────────────────────────────────────────────────────
async function deleteTask(taskId, e) {
  e.stopPropagation();
  await fetch(`${BASE_URL}/task/${taskId}`, { method: 'DELETE' });
  if (activeTaskId === taskId) {
    activeTaskId = null;
    document.getElementById('stepsList').innerHTML =
      '<div style="color:var(--muted);padding:10px;font-size:10px">Select a task to see steps</div>';
    document.getElementById('panelActions').style.display = 'none';
  }
  loadTasks();
}

async function deleteAllTasks() {
  if (!confirm('Delete ALL tasks? This cannot be undone.')) return;
  await fetch(`${BASE_URL}/tasks/all`, { method: 'DELETE' });
  activeTaskId = null;
  document.getElementById('stepsList').innerHTML =
    '<div style="color:var(--muted);padding:10px;font-size:10px">Select a task to see steps</div>';
  document.getElementById('panelActions').style.display = 'none';
  loadTasks();
}

async function deleteFile(filename, e) {
  e.stopPropagation();
  await fetch(`${BASE_URL}/files/${encodeURIComponent(filename)}`, { method: 'DELETE' });
  refreshFiles();
}

async function deleteAllFiles() {
  if (!confirm('Delete ALL generated files?')) return;
  await fetch(`${BASE_URL}/files/all/clear`, { method: 'DELETE' });
  refreshFiles();
}

// ─── Files panel ─────────────────────────────────────────────────────────────
async function refreshFiles() {
  try {
    const res   = await fetch(`${BASE_URL}/files`);
    const data  = await res.json();
    const files = data.files || [];
    const el    = document.getElementById('filesList');

    if (!files.length) {
      el.innerHTML = '<div style="color:var(--muted);font-size:10px">No files yet</div>';
      return;
    }

    el.innerHTML = files.map(f => {
      const ext = f.name.split('.').pop().toLowerCase();
      return `<div class="file-item">
        <span class="file-ext ext-${ext}">${ext}</span>
        <span class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
        <a class="file-dl" href="${BASE_URL}${f.url}" download="${escHtml(f.name)}">↓</a>
        <button class="file-x" onclick="deleteFile('${escHtml(f.name)}',event)" title="Delete">✕</button>
      </div>`;
    }).join('');
  } catch {}
}
refreshFiles();
setInterval(refreshFiles, 8000);

// ─── Devices ─────────────────────────────────────────────────────────────────
async function refreshDevices() {
  try {
    const res  = await fetch(`${BASE_URL}/devices`);
    const data = await res.json();
    const devs = data.devices || [];
    const row  = document.getElementById('devicesRow');
    const cnt  = document.getElementById('deviceCount');

    if (!devs.length) {
      row.textContent = 'No devices connected';
      cnt.textContent = '0 devices';
    } else {
      row.innerHTML = devs.map(d => `<span class="device-chip">⬡ ${escHtml(d)}</span>`).join(' ');
      cnt.textContent = `${devs.length} device${devs.length>1?'s':''}`;
    }
  } catch {}
}
refreshDevices();
setInterval(refreshDevices, 15000);

// ─── Keyboard shortcut ────────────────────────────────────────────────────────
document.getElementById('cmdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendCommand();
});
</script>
