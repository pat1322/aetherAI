<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AetherAI — Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080b10;
      --bg2:       #0d1117;
      --border:    #1e2a38;
      --accent:    #00e5ff;
      --accent2:   #7b61ff;
      --warn:      #ff6b35;
      --green:     #00ff9d;
      --text:      #c9d1d9;
      --muted:     #4a5568;
      --card:      #0f1923;
      --glow:      0 0 20px rgba(0,229,255,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Scan line overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Layout ── */
    .shell {
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 280px 1fr 320px;
      height: 100vh;
      gap: 0;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: none;
    }

    .dot.online::before {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 8px;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 4px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .task-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }

    .task-item:hover {
      border-color: var(--accent);
      transform: translateX(2px);
    }

    .task-item.active {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    .task-cmd {
      color: #fff;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
    }

    .badge {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    .badge-pending  { background: rgba(74,85,104,0.3); color: var(--muted); }
    .badge-running  { background: rgba(0,229,255,0.12); color: var(--accent); }
    .badge-planning { background: rgba(123,97,255,0.15); color: var(--accent2); }
    .badge-completed{ background: rgba(0,255,157,0.12); color: var(--green); }
    .badge-failed   { background: rgba(255,107,53,0.12); color: var(--warn); }
    .badge-cancelled{ background: rgba(74,85,104,0.2);  color: var(--muted); }

    /* ── Main area ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── Output / log ── */
    .output {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      font-size: 12.5px;
      line-height: 1.7;
    }

    .output::-webkit-scrollbar { width: 4px; }
    .output::-webkit-scrollbar-track { background: transparent; }
    .output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .log-entry {
      display: flex;
      gap: 12px;
      margin-bottom: 6px;
      opacity: 0;
      transform: translateY(4px);
      animation: fadeUp 0.25s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .log-time {
      color: var(--muted);
      white-space: nowrap;
      min-width: 70px;
      padding-top: 1px;
    }

    .log-msg { flex: 1; }
    .log-msg.system  { color: var(--accent); }
    .log-msg.agent   { color: var(--accent2); }
    .log-msg.result  { color: var(--green); }
    .log-msg.error   { color: var(--warn); }
    .log-msg.info    { color: var(--text); }

    /* ── Command input ── */
    .input-row {
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--bg2);
    }

    .prompt {
      color: var(--accent);
      font-size: 14px;
      white-space: nowrap;
    }

    #cmdInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      caret-color: var(--accent);
    }

    #cmdInput::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 5px;
      padding: 7px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover  { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.danger { background: var(--warn); }

    /* ── Right panel (task detail) ── */
    .panel {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .steps-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .step.running  { border-color: var(--accent); }
    .step.completed{ border-color: rgba(0,255,157,0.25); }
    .step.failed   { border-color: rgba(255,107,53,0.25); }

    .step-icon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-icon.pending   { background: var(--border); color: var(--muted); }
    .step-icon.running   { background: rgba(0,229,255,0.15); color: var(--accent); }
    .step-icon.completed { background: rgba(0,255,157,0.12); color: var(--green); }
    .step-icon.failed    { background: rgba(255,107,53,0.12); color: var(--warn); }

    .step-info { flex: 1; min-width: 0; }
    .step-agent { font-size: 10px; color: var(--accent2); margin-bottom: 2px; }
    .step-desc  { font-size: 11px; color: var(--text); line-height: 1.5; }
    .step-output{
      font-size: 10px; color: var(--muted);
      margin-top: 4px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .panel-actions {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    /* ── Devices section ── */
    .devices-row {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
    }

    .device-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      margin: 4px 4px 0 0;
      font-size: 10px;
    }

    /* ── Welcome screen ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
    }

    .welcome-logo {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .welcome p { font-size: 12px; max-width: 340px; text-align: center; line-height: 1.8; }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid rgba(0,229,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Files panel ── */
    .files-section {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    .files-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 5px;
      margin-bottom: 5px;
      gap: 8px;
    }
    .file-name {
      font-size: 10px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .file-ext {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .ext-pptx { background: rgba(255,107,53,0.15); color: #ff6b35; }
    .ext-docx { background: rgba(0,229,255,0.12); color: var(--accent); }
    .ext-xlsx { background: rgba(0,255,157,0.12); color: var(--green); }
    .file-dl {
      font-size: 9px;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .file-dl:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="shell">

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      AetherAI
    </div>
    <div class="status-bar">
      <span class="dot online" id="connStatus">CONNECTED</span>
      <span id="deviceStatus">0 devices</span>
      <span id="clockDisplay"></span>
    </div>
  </header>

  <!-- ── Left sidebar: task history ── -->
  <aside class="sidebar">
    <div class="sidebar-title">Recent Tasks</div>
    <div id="taskList"></div>
  </aside>

  <!-- ── Main: log output + command input ── -->
  <main class="main">
    <div class="output" id="output">
      <div class="welcome">
        <div class="welcome-logo">AetherAI</div>
        <p>Your personal AI agent system. Type a command below and press Enter to begin.</p>
      </div>
    </div>
    <div class="input-row">
      <span class="prompt">aether&gt;</span>
      <input type="text" id="cmdInput" placeholder="Create a presentation about renewable energy..." autocomplete="off" />
      <button class="btn" id="sendBtn" onclick="sendCommand()">Run</button>
      <button class="btn danger" id="stopBtn" onclick="stopTask()" style="display:none">Stop</button>
    </div>
  </main>

  <!-- ── Right panel: active task detail ── -->
  <aside class="panel">
    <div class="panel-header">Task Detail</div>
    <div class="devices-row" id="devicesRow">No devices connected</div>
    <div class="steps-list" id="stepsList">
      <div style="color:var(--muted);padding:12px;font-size:11px">Select a task to see steps</div>
    </div>
    <div class="files-section" id="filesSection">
      <div class="files-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Generated Files</span>
        <button onclick="deleteAllFiles()" style="background:none;border:none;color:var(--warn);font-size:9px;cursor:pointer;" title="Clear all files">✕ Clear</button>
      </div>
      <div id="filesList"><div style="color:var(--muted);font-size:10px">No files yet</div></div>
    </div>
    <div class="panel-actions" id="panelActions" style="display:none">
      <button class="btn danger" style="width:100%" onclick="cancelActiveTask()">Cancel Task</button>
    </div>
  </aside>

</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const BASE_URL   = window.location.origin;
const WS_BASE    = BASE_URL.replace(/^http/, 'ws');
const API_KEY    = localStorage.getItem('aether_api_key') || '';
const SESSION_ID = crypto.randomUUID();

// ─── State ───────────────────────────────────────────────────────────────────
let ws            = null;
let activeTaskId  = null;
let tasks         = {};

// ─── Clock ───────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clockDisplay').textContent =
    new Date().toLocaleTimeString([], { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// ─── WebSocket (live updates) ────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(`${WS_BASE}/ws/ui/${SESSION_ID}`);

  ws.onopen = () => {
    document.getElementById('connStatus').className = 'dot online';
    document.getElementById('connStatus').textContent = 'ONLINE';
  };

  ws.onclose = () => {
    document.getElementById('connStatus').className = 'dot';
    document.getElementById('connStatus').textContent = 'OFFLINE';
    setTimeout(connectWS, 3000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'task_update') handleTaskUpdate(data);
    if (data.type === 'device_connected') refreshDevices();
    if (data.type === 'ping') ws.send(JSON.stringify({ type: 'pong' }));
  };
}
connectWS();

// ─── Task updates ────────────────────────────────────────────────────────────
function handleTaskUpdate(data) {
  const { task_id, status, message, agent, current_step, result, plan } = data;

  if (plan) renderPlan(plan);

  if (message) log(message, agentClass(agent || status));

  if (data.is_chat && result) {
    log('💬 ' + result, 'result');
    sendBtn.disabled = false; stopBtn.style.display = 'none'; sendBtn.style.display = '';
    cmdInput.disabled = false;
    return;
  }
  if (result && status === 'completed') {
    log('✓ ' + result, 'result');
  }

  if (status === 'completed' || status === 'failed' || status === 'cancelled') {
    refreshFiles();
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('sendBtn').disabled = false;
    if (activeTaskId === task_id) {
      document.getElementById('panelActions').style.display = 'none';
    }
  }

  // Refresh task list
  loadTasks();
}

function agentClass(hint) {
  if (!hint) return 'info';
  if (hint.includes('agent')) return 'agent';
  if (hint === 'planning') return 'system';
  if (hint === 'completed') return 'result';
  if (hint === 'failed') return 'error';
  return 'info';
}

// ─── Send command ─────────────────────────────────────────────────────────────
async function sendCommand() {
  const input = document.getElementById('cmdInput');
  const cmd = input.value.trim();
  if (!cmd) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'inline-block';

  clearOutput();
  log(`> ${cmd}`, 'system');

  try {
    const res = await fetch(`${BASE_URL}/command`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': API_KEY },
      body: JSON.stringify({ command: cmd, source: 'web' }),
    });
    const data = await res.json();
    activeTaskId = data.task_id;
    log(`Task ID: ${data.task_id}`, 'info');
    document.getElementById('panelActions').style.display = 'flex';
    loadTasks();
  } catch (err) {
    log('Connection error: ' + err.message, 'error');
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('stopBtn').style.display = 'none';
  }
}

async function stopTask() {
  if (!activeTaskId) return;
  await fetch(`${BASE_URL}/task/${activeTaskId}/cancel`, { method: 'POST' });
  log('Stop signal sent.', 'system');
}

async function cancelActiveTask() {
  await stopTask();
}

// ─── Task list ────────────────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const res = await fetch(`${BASE_URL}/tasks`);
    const list = await res.json();
    renderTaskList(list);
  } catch {}
}

function renderTaskList(list) {
  const el = document.getElementById('taskList');
  el.innerHTML = '';
  list.forEach(t => {
    const div = document.createElement('div');
    div.className = `task-item${t.task_id === activeTaskId ? ' active' : ''}`;
    div.innerHTML = `
      <div class="task-cmd">${escHtml(t.command)}</div>
      <div class="task-meta">
        <span>${timeAgo(t.created_at)}</span>
        <span class="badge badge-${t.status}">${t.status}</span>
      </div>`;
    div.onclick = () => loadTaskDetail(t.task_id);
    el.appendChild(div);
  });
}

async function loadTaskDetail(taskId) {
  activeTaskId = taskId;
  try {
    const res = await fetch(`${BASE_URL}/task/${taskId}`);
    const task = await res.json();
    renderSteps(task.steps || []);
    const running = ['pending','planning','running'].includes(task.status);
    document.getElementById('panelActions').style.display = running ? 'flex' : 'none';
  } catch {}
}

function renderPlan(plan) {
  const steps = plan.map((s, i) => ({
    step_number: s.step || i + 1,
    agent: s.agent,
    description: s.description,
    status: 'pending',
  }));
  renderSteps(steps);
}

function renderSteps(steps) {
  const el = document.getElementById('stepsList');
  el.innerHTML = '';
  steps.forEach(s => {
    const icon = { pending: '○', running: '◌', completed: '✓', failed: '✗' }[s.status] || '○';
    el.innerHTML += `
      <div class="step ${s.status}">
        <div class="step-icon ${s.status}">${icon}</div>
        <div class="step-info">
          <div class="step-agent">${s.agent || ''}</div>
          <div class="step-desc">${escHtml(s.description || '')}</div>
          ${s.output ? `<div class="step-output">${escHtml(s.output)}</div>` : ''}
        </div>
      </div>`;
  });
}

// ─── Devices ──────────────────────────────────────────────────────────────────
async function refreshDevices() {
  try {
    const res = await fetch(`${BASE_URL}/devices`);
    const data = await res.json();
    const devices = data.devices || [];
    const el = document.getElementById('deviceStatus');
    el.textContent = `${devices.length} device${devices.length !== 1 ? 's' : ''}`;

    const row = document.getElementById('devicesRow');
    if (devices.length === 0) {
      row.textContent = 'No devices connected';
    } else {
      row.innerHTML = devices.map(d =>
        `<span class="device-chip"><span class="dot online"></span>${d.device_id}</span>`
      ).join('');
    }
  } catch {}
}
refreshDevices();
setInterval(refreshDevices, 10000);
setInterval(loadTasks, 5000);

// ─── Output log ───────────────────────────────────────────────────────────────
function log(msg, type = 'info') {
  const output = document.getElementById('output');
  const welcome = output.querySelector('.welcome');
  if (welcome) welcome.remove();

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const now = new Date().toLocaleTimeString([], { hour12: false });
  entry.innerHTML = `<span class="log-time">[${now}]</span><span class="log-msg ${type}">${escHtml(msg)}</span>`;
  output.appendChild(entry);
  output.scrollTop = output.scrollHeight;
}

function clearOutput() {
  document.getElementById('output').innerHTML = '';
  document.getElementById('stepsList').innerHTML =
    '<div style="color:var(--muted);padding:12px;font-size:11px">Waiting for plan...</div>';
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso + 'Z').getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}


// ─── Files ───────────────────────────────────────────────────────────────────
async function refreshFiles() {
  try {
    const res = await fetch(`${BASE_URL}/files`);
    const data = await res.json();
    const files = data.files || [];
    const el = document.getElementById('filesList');
    if (files.length === 0) {
      el.innerHTML = '<div style="color:var(--muted);font-size:10px">No files yet</div>';
      return;
    }
    el.innerHTML = files.map(f => {
      const ext = f.name.split('.').pop().toLowerCase();
      const extClass = `ext-${ext}`;
      return `<div class="file-item">
        <span class="file-ext ${extClass}">${ext}</span>
        <span class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
        <a class="file-dl" href="${BASE_URL}${f.url}" download="${escHtml(f.name)}">↓ Download</a>
      </div>`;
    }).join('');
  } catch {}
}
refreshFiles();
setInterval(refreshFiles, 8000);

// ─── Keyboard shortcut ────────────────────────────────────────────────────────
document.getElementById('cmdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendCommand();
});

// ─── Initial load ─────────────────────────────────────────────────────────────
loadTasks();
</script>
</body>
</html>
